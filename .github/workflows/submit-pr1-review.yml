                },
                {
                  path: 'Client/Utils/Utility.cs',
                  line: 32,
                  side: 'RIGHT',
                  body: `🟢 **\`UsedSpawnPointIds\` is declared and cleared but never read or written elsewhere.**

\`\`\`csharp
