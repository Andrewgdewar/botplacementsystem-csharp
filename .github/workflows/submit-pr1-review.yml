name: Submit PR #1 Review

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/andrewgdewarbotplacementsystem-csharp
    paths:
      - '.github/pr1-review-data.json'
      - '.github/workflows/submit-pr1-review.yml'

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout copilot branch
        uses: actions/checkout@v4

      - name: Submit formal review on PR #1
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewData = JSON.parse(fs.readFileSync('.github/pr1-review-data.json', 'utf8'));

            const review = await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: 1,
              commit_id: reviewData.commit_id,
              event: reviewData.event,
              body: reviewData.body,
              comments: reviewData.comments
            });

            console.log('Review submitted successfully!');
            console.log('Review ID:', review.data.id);
            console.log('Review URL:', review.data.html_url);
            core.setOutput('review_id', review.data.id);
            core.setOutput('review_url', review.data.html_url);
